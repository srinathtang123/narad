<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Narad — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    /* ── Auth Screen ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .logo { font-size: 32px; font-weight: 800; color: #E8541E; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 40px; }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .card h2 { font-size: 20px; margin-bottom: 20px; color: #111; }

    label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }

    input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #e0e0e0; border-radius: 8px;
      font-size: 15px; color: #222; margin-bottom: 16px;
      outline: none; transition: border-color 0.2s;
    }

    input:focus { border-color: #E8541E; }

    .btn {
      width: 100%; padding: 13px;
      background: #E8541E; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { color: #ef4444; font-size: 13px; margin-top: 10px; text-align: center; }

    /* ── Admin App ── */
    #app { display: none; }

    header {
      background: #fff;
      border-bottom: 1px solid #eee;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
      position: sticky; top: 0; z-index: 10;
    }

    .header-logo { font-size: 18px; font-weight: 800; color: #E8541E; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .admin-email { font-size: 13px; color: #888; }

    .signout-btn {
      background: none; border: 1.5px solid #ddd;
      border-radius: 7px; padding: 6px 14px;
      font-size: 13px; color: #555; cursor: pointer;
    }
    .signout-btn:hover { background: #f5f5f5; }

    .main { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

    .top-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 20px;
    }

    .page-title { font-size: 22px; font-weight: 700; color: #111; }

    .tabs { display: flex; gap: 4px; background: #eee; border-radius: 8px; padding: 3px; }

    .tab-btn {
      padding: 6px 16px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: transparent; color: #777;
    }
    .tab-btn.active { background: #fff; color: #111; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    #stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 20px;
    }

    .stat-card {
      background: #fff; border-radius: 10px; padding: 18px 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    .stat-card .num { font-size: 28px; font-weight: 800; color: #111; }
    .stat-card .lbl { font-size: 12px; color: #aaa; margin-top: 2px; }

    #articles-list { display: flex; flex-direction: column; gap: 12px; }

    .article-card {
      background: #fff; border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      display: flex; gap: 16px; align-items: flex-start;
    }

    .article-thumb {
      width: 100px; height: 70px; object-fit: cover;
      border-radius: 8px; flex-shrink: 0; background: #f0f0f0;
    }

    .article-thumb-placeholder {
      width: 100px; height: 70px; border-radius: 8px;
      background: #f0f0f0; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: #ccc; font-size: 11px;
    }

    .article-content { flex: 1; min-width: 0; }

    .article-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px; flex-wrap: wrap;
    }

    .cat-badge {
      background: #fff4f0; color: #E8541E;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 12px;
      text-transform: uppercase;
    }

    .location-tag {
      font-size: 11px; color: #aaa;
      display: flex; align-items: center; gap: 3px;
    }

    .time-tag { font-size: 11px; color: #ccc; margin-left: auto; }

    .article-title {
      font-size: 16px; font-weight: 700; color: #111;
      margin-bottom: 6px; line-height: 1.4;
    }

    .article-body {
      font-size: 13px; color: #666; line-height: 1.6;
      margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .article-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .author-chip {
      font-size: 12px; color: #888; background: #f5f5f5;
      padding: 3px 10px; border-radius: 20px;
    }

    .action-row { display: flex; gap: 8px; margin-left: auto; }

    .approve-btn, .reject-btn {
      padding: 7px 18px; border-radius: 7px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      border: none; transition: opacity 0.2s;
    }
    .approve-btn { background: #22c55e; color: #fff; }
    .approve-btn:hover { opacity: 0.85; }
    .reject-btn { background: #fee2e2; color: #ef4444; }
    .reject-btn:hover { background: #fecaca; }
    .approve-btn:disabled, .reject-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status-badge {
      display: inline-block; padding: 4px 12px;
      border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .status-live { background: #dcfce7; color: #16a34a; }
    .status-rejected { background: #fee2e2; color: #ef4444; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: #aaa; font-size: 15px;
    }

    .loading { text-align: center; padding: 40px; color: #aaa; }

    .expand-btn {
      background: none; border: none; color: #E8541E;
      font-size: 12px; cursor: pointer; font-weight: 600;
      padding: 0; margin-left: 4px;
    }
  </style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="auth-screen">
  <div class="logo">The Narad</div>
  <div class="subtitle">Admin Panel</div>
  <div class="card">
    <h2>Sign In</h2>
    <label>Email</label>
    <input type="email" id="email-input" placeholder="admin@example.com" />
    <label>Password</label>
    <input type="password" id="password-input" placeholder="••••••••" />
    <button class="btn" id="login-btn" onclick="signIn()">Sign In</button>
    <div class="error-msg" id="auth-error"></div>
  </div>
</div>

<!-- ── Admin App ── -->
<div id="app">
  <header>
    <div class="header-logo">The Narad — Admin</div>
    <div class="header-right">
      <span class="admin-email" id="admin-email-display"></span>
      <button class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <div class="main">
    <div class="top-row">
      <div class="page-title">Article Moderation</div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('pending', this)">Pending</button>
        <button class="tab-btn" onclick="switchTab('live', this)">Live</button>
        <button class="tab-btn" onclick="switchTab('rejected', this)">Rejected</button>
      </div>
    </div>

    <div id="stats-row">
      <div class="stat-card">
        <div class="num" id="stat-pending">—</div>
        <div class="lbl">Pending Review</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-live">—</div>
        <div class="lbl">Live Articles</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-rejected">—</div>
        <div class="lbl">Rejected</div>
      </div>
    </div>

    <div id="articles-list">
      <div class="loading">Loading...</div>
    </div>
  </div>
</div>

<script>
  // ── Config — fill these in ──
  const SUPABASE_URL = 'https://your-project.supabase.co';
  const SUPABASE_ANON_KEY = 'your-anon-key';
  const API_URL = 'http://localhost:4000';
  // ────────────────────────────

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentTab = 'pending';
  let accessToken = null;

  // ── Auth ──
  async function signIn() {
    const email = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('auth-error');

    if (!email || !password) {
      errEl.textContent = 'Enter email and password.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.textContent = '';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errEl.textContent = error.message;
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }

    accessToken = data.session.access_token;
    showApp(data.user.email);
  }

  async function signOut() {
    await sb.auth.signOut();
    accessToken = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
  }

  function showApp(email) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('admin-email-display').textContent = email;
    loadStats();
    loadArticles('pending');
  }

  // ── Data ──
  async function apiFetch(path, options = {}) {
    const res = await fetch(`${API_URL}${path}`, {
      ...options,
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${accessToken}`,
        ...(options.headers || {}),
      },
    });
    return res.json();
  }

  async function loadStats() {
    const [pending, live, rejected] = await Promise.all([
      apiFetch('/api/admin/articles?status=pending'),
      apiFetch('/api/admin/articles?status=live'),
      apiFetch('/api/admin/articles?status=rejected'),
    ]);
    document.getElementById('stat-pending').textContent = Array.isArray(pending) ? pending.length : '—';
    document.getElementById('stat-live').textContent = Array.isArray(live) ? live.length : '—';
    document.getElementById('stat-rejected').textContent = Array.isArray(rejected) ? rejected.length : '—';
  }

  async function loadArticles(status) {
    const list = document.getElementById('articles-list');
    list.innerHTML = '<div class="loading">Loading...</div>';
    const data = await apiFetch(`/api/admin/articles?status=${status}`);

    if (!Array.isArray(data) || data.length === 0) {
      list.innerHTML = `<div class="empty-state">No ${status} articles.</div>`;
      return;
    }

    list.innerHTML = data.map((a) => renderCard(a, status)).join('');
  }

  function renderCard(a, status) {
    const author = a.users?.name || 'Anonymous';
    const city = a.users?.city || '';
    const thumb = a.image_url
      ? `<img class="article-thumb" src="${a.image_url}" alt="thumb" />`
      : `<div class="article-thumb-placeholder">No image</div>`;

    const timeAgo = (() => {
      const diff = Date.now() - new Date(a.created_at).getTime();
      const h = Math.floor(diff / 3600000);
      if (h < 1) return 'Just now';
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    })();

    const actions = status === 'pending'
      ? `<div class="action-row">
           <button class="reject-btn" onclick="updateStatus('${a.id}', 'rejected', this)">Reject</button>
           <button class="approve-btn" onclick="updateStatus('${a.id}', 'live', this)">Approve</button>
         </div>`
      : `<span class="status-badge status-${status}">${status}</span>`;

    return `
      <div class="article-card" id="card-${a.id}">
        ${thumb}
        <div class="article-content">
          <div class="article-meta">
            <span class="cat-badge">${a.category}</span>
            ${a.location_text ? `<span class="location-tag">📍 ${a.location_text}</span>` : ''}
            <span class="time-tag">${timeAgo}</span>
          </div>
          <div class="article-title">${escHtml(a.title)}</div>
          <div class="article-body">${escHtml(a.body)}</div>
          <div class="article-footer">
            <span class="author-chip">👤 ${escHtml(author)}${city ? ' · ' + escHtml(city) : ''}</span>
            ${actions}
          </div>
        </div>
      </div>
    `;
  }

  async function updateStatus(id, status, btn) {
    const card = document.getElementById(`card-${id}`);
    const btns = card.querySelectorAll('button');
    btns.forEach((b) => (b.disabled = true));

    const data = await apiFetch(`/api/admin/articles/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ status }),
    });

    if (data.error) {
      alert('Error: ' + data.error);
      btns.forEach((b) => (b.disabled = false));
      return;
    }

    // Remove card with fade
    card.style.transition = 'opacity 0.3s, transform 0.3s';
    card.style.opacity = '0';
    card.style.transform = 'translateX(20px)';
    setTimeout(() => card.remove(), 300);

    // Update stats
    loadStats();
  }

  function switchTab(status, el) {
    currentTab = status;
    document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
    el.classList.add('active');
    loadArticles(status);
  }

  function escHtml(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Check existing session on load
  sb.auth.getSession().then(({ data }) => {
    if (data.session) {
      accessToken = data.session.access_token;
      showApp(data.session.user.email);
    }
  });
</script>
</body>
</html>
